services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ${POSTNATAL_PULSE_ENV_FILE:-.env}
    environment:
      CORS_ALLOWED_ORIGINS: ${COMPOSE_CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_HOST_PORT:-5173},http://127.0.0.1:${FRONTEND_HOST_PORT:-5173}}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=5).read()
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:${BACKEND_HOST_PORT:-8000}}
        VITE_API_KEY: ${VITE_API_KEY:-dev-api-key}
    env_file:
      - ${POSTNATAL_PULSE_ENV_FILE:-.env}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:4173"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - |
          fetch("http://127.0.0.1:4173").then((response) => {
            if (!response.ok) {
              process.exit(1)
            }
          }).catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
